<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganttopia</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for modern icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left" style="display: flex; align-items: center; gap: 12px;">
                <div class="logo">
                    <h1>Ganttopia</h1>
                </div>
                <div id="app-mode-badge" style="display: none; align-items: center; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;"></div>
            </div>
            <div class="controls" style="margin-left: auto;">
                <div class="zoom-controls" style="display: flex; align-items: center; gap: 8px;">
                    <button id="btn-zoom-reset" class="btn btn-secondary" title="ズームをリセット">
                        <i class="ph ph-arrows-in"></i> 等倍
                    </button>
                    <span id="zoom-percentage" style="font-size: 13px; font-weight: 600; color: var(--text-secondary); width: 45px; text-align: right;">100%</span>
                </div>
                <button id="btn-today" class="btn btn-secondary">
                    <i class="ph ph-calendar-blank"></i> 今日
                </button>
                <div class="scale-selector">
                    <button class="scale-btn active" data-scale="day">日</button>
                    <button class="scale-btn" data-scale="week">週</button>
                    <button class="scale-btn" data-scale="month">月</button>
                </div>
                <div class="actions">
                    <button id="btn-export-list" class="btn btn-secondary" style="display: none;">
                        <i class="ph ph-file-csv"></i> 一覧出力
                    </button>
                    <button id="btn-export-gantt" class="btn btn-secondary">
                        <i class="ph ph-file-xls"></i> ガント出力
                    </button>
                    <button id="btn-add-task" class="btn btn-primary">
                        <i class="ph ph-plus"></i> タスク追加
                    </button>
                    <button id="btn-settings" class="btn btn-secondary" title="表示設定">
                        <i class="ph ph-gear"></i>
                    </button>
            </div>
        </header>

        <div class="page-tabs-container">
            <div class="page-tabs" id="page-tabs">
                <!-- Tabs will be rendered here by JS -->
            </div>
            <button id="btn-add-page" class="btn-icon" title="新しいページを追加">
                <i class="ph ph-plus-circle"></i>
            </button>
            <div class="page-summary" id="page-summary">
                <i class="ph ph-chart-bar"></i>
                合計工数: <strong id="total-man-hours">0</strong> 時間
            </div>
        </div>

        <main class="main-content">
            <div class="gantt-container">
                <!-- Left panel: Task List -->
                <div class="task-list-panel">
                    <div class="task-list-header">
                        <div class="col-name">タスク名</div>
                        <div class="col-assignee">担当者</div>
                        <div class="col-man-hours">工数(h)</div>
                        <div class="col-date">開始日</div>
                        <div class="col-date">終了日</div>
                        <div class="col-progress">%</div>
                    </div>
                    <div class="task-list-body" id="task-list-body">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
                
                <!-- Right panel: Timeline -->
                <div class="timeline-panel" id="timeline-panel">
                    <div class="timeline-header" id="timeline-header">
                        <!-- Dates will be rendered here -->
                    </div>
                    <div class="timeline-body" id="timeline-body">
                        <!-- Gantt bars will be rendered here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Adding/Editing Task -->
    <div class="modal" id="task-modal">
        <div class="modal-content glass-effect">
            <h2 id="modal-title">タスク追加</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label>タスク名</label>
                    <input type="text" id="task-name" required placeholder="タスクを入力...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>親タスク (ID)</label>
                        <select id="task-parent-id">
                            <option value="">なし（メインタスク）</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>開始日</label>
                        <input type="date" id="task-start" required>
                    </div>
                    <div class="form-group">
                        <label>終了日</label>
                        <input type="date" id="task-end" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>予定工数 (h)</label>
                        <input type="number" id="task-man-hours" min="0" step="0.5" value="0">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>進捗率 (%)</label>
                        <input type="number" id="task-progress" min="0" max="100" value="0">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>担当者</label>
                        <input type="text" id="task-assignee" placeholder="担当者名">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>テーマカラー</label>
                        <div class="color-palette" id="color-palette">
                            <div class="color-swatch active" data-color="#3b82f6" style="background-color: #3b82f6;"></div>
                            <div class="color-swatch" data-color="#ef4444" style="background-color: #ef4444;"></div>
                            <div class="color-swatch" data-color="#10b981" style="background-color: #10b981;"></div>
                            <div class="color-swatch" data-color="#f59e0b" style="background-color: #f59e0b;"></div>
                            <div class="color-swatch" data-color="#8b5cf6" style="background-color: #8b5cf6;"></div>
                            <div class="color-swatch" data-color="#ec4899" style="background-color: #ec4899;"></div>
                            <div class="color-swatch" data-color="#06b6d4" style="background-color: #06b6d4;"></div>
                            <div class="color-swatch" data-color="#84cc16" style="background-color: #84cc16;"></div>
                            <div class="color-swatch" data-color="#6366f1" style="background-color: #6366f1;"></div>
                            <div class="color-swatch" data-color="#64748b" style="background-color: #64748b;"></div>
                            <div class="color-swatch" data-color="#111827" style="background-color: #111827;"></div>
                        </div>
                        <input type="hidden" id="task-color" value="#3b82f6">
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="task-milestone">
                    <label for="task-milestone">マイルストーンとして設定（期間なし）</label>
                </div>
                <div class="form-group">
                    <label>メモ / コメント</label>
                    <textarea id="task-memo" rows="8" placeholder="タスクに関する詳細なメモや補足情報を入力..." style="padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; resize: vertical; outline: none; min-height: 150px;"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-reset-baseline" style="margin-right: auto;" title="現在の開始・終了日を新しい「当初計画」として保存します">
                        <i class="ph ph-clock-counter-clockwise"></i> 計画を再設定
                    </button>
                    <button type="button" class="btn btn-text" id="btn-cancel">キャンセル</button>
                    <button type="submit" class="btn btn-primary" id="btn-save">保存</button>
                    <button type="button" class="btn btn-danger" id="btn-delete" style="display: none;">削除</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Page Modal -->
    <div id="page-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h2>新しいページを追加</h2>
            <div class="form-group" style="margin-top: 20px;">
                <label for="page-name-input">ページ名</label>
                <input type="text" id="page-name-input" placeholder="例: プロジェクトB" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px;">
            </div>
            <div class="modal-actions" style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
                <button id="btn-page-cancel" class="btn btn-secondary">キャンセル</button>
                <button id="btn-page-save" class="btn btn-primary">作成</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content" style="max-width: 420px;">
            <h2 id="confirm-title">確認</h2>
            <p id="confirm-message" style="margin-top: 16px; color: var(--text-secondary); line-height: 1.6;"></p>
            <div class="modal-actions" style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
                <button id="btn-confirm-cancel" class="btn btn-secondary">キャンセル</button>
                <button id="btn-confirm-ok" class="btn btn-danger">削除する</button>
            </div>
        </div>
    </div>
    <!-- Custom Context Menu -->
    <div id="context-menu" class="context-menu">
        <div class="menu-item" id="cm-add-child"><i class="ph ph-plus-circle"></i> 子タスクを追加</div>
        <div class="menu-item" id="cm-duplicate"><i class="ph ph-copy"></i> タスクを複製</div>
        <div class="menu-item danger" id="cm-delete"><i class="ph ph-trash"></i> 削除</div>
        <div class="menu-divider"></div>
        <div class="menu-title">進捗率</div>
        <div class="progress-options">
            <button class="prog-btn" data-prog="0">0%</button>
            <button class="prog-btn" data-prog="25">25%</button>
            <button class="prog-btn" data-prog="50">50%</button>
            <button class="prog-btn" data-prog="75">75%</button>
            <button class="prog-btn" data-prog="100">100%</button>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-title">カラー変更</div>
        <div class="color-options" id="cm-color-palette">
            <div class="cm-color-swatch" data-color="#3b82f6" style="background-color: #3b82f6;"></div>
            <div class="cm-color-swatch" data-color="#ef4444" style="background-color: #ef4444;"></div>
            <div class="cm-color-swatch" data-color="#10b981" style="background-color: #10b981;"></div>
            <div class="cm-color-swatch" data-color="#f59e0b" style="background-color: #f59e0b;"></div>
            <div class="cm-color-swatch" data-color="#8b5cf6" style="background-color: #8b5cf6;"></div>
            <div class="cm-color-swatch" data-color="#ec4899" style="background-color: #ec4899;"></div>
            <div class="cm-color-swatch" data-color="#06b6d4" style="background-color: #06b6d4;"></div>
            <div class="cm-color-swatch" data-color="#84cc16" style="background-color: #84cc16;"></div>
            <div class="cm-color-swatch" data-color="#6366f1" style="background-color: #6366f1;"></div>
            <div class="cm-color-swatch" data-color="#64748b" style="background-color: #64748b;"></div>
            <div class="cm-color-swatch" data-color="#111827" style="background-color: #111827;"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content glass-effect">
            <h2>表示設定</h2>
            <div class="settings-group">
                <div class="setting-item">
                    <label class="switch-label">
                        <input type="checkbox" id="setting-show-diff" checked>
                        <span class="switch-text">延長・短縮（差分）を表示する</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="switch-label">
                        <input type="checkbox" id="setting-show-pattern" checked>
                        <span class="switch-text">枠内の斜線パターンを表示する</span>
                    </label>
                </div>
                <div class="setting-item vertical">
                    <label class="setting-label">子タスクの太さ</label>
                    <div class="thickness-selector">
                        <input type="range" id="setting-bar-thickness" min="1" max="3" step="1" value="2">
                        <div class="thickness-labels">
                            <span>細め</span>
                            <span>標準</span>
                            <span>太め</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-settings-close" class="btn btn-primary">閉じる</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
